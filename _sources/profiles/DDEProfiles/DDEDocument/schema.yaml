---
$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: DDE Document profile
description: DDE profile for document resources (document, article, thesis, book,
  poster, webPage). Extends DDEDiscovery with resource type constraint.
allOf:
- $ref: ../../../DDEproperties/ddeCore/schema.yaml
- properties:
    'schema:additionalType':
      contains:
        type: object
        properties:
          '@type':
            const: schema:DefinedTerm
          'schema:inDefinedTermSet':
            const: 'dde:codelist/ResourceTypeCode'
          'schema:termCode':
            type: string
            enum:
            - document
            - article
            - thesis
            - book
            - poster
            - webPage
        required:
        - '@type'
        - 'schema:inDefinedTermSet'
        - 'schema:termCode'
      minContains: 1
    'schema:temporalCoverage':
      description: Temporal extent of resource content.
      type: array
      items:
        $ref: '#/$defs/TemporalExtent'
$defs:
  TemporalExtent:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/_sources/schemaorgProperties/temporalExtent/schema.yaml
