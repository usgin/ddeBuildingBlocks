---
$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: DDE Collection profile
description: DDE profile for collection resources (aggregate, collection, series,
  learningResource, guide). Extends DDEDiscovery with resource type constraint
  and requires schema:hasPart to describe collection members.
allOf:
- $ref: ../../../DDEproperties/ddeCore/schema.yaml
- $ref: ../../../DDEproperties/ddeOptional/schema.yaml
- properties:
    'schema:additionalType':
      contains:
        type: object
        properties:
          '@type':
            const: schema:DefinedTerm
          'schema:inDefinedTermSet':
            const: 'dde:codelist/ResourceTypeCode'
          'schema:termCode':
            type: string
            enum:
            - aggregate
            - collection
            - series
            - learningResource
            - guide
        required:
        - '@type'
        - 'schema:inDefinedTermSet'
        - 'schema:termCode'
      minContains: 1
    'schema:hasPart':
      type: array
      description: Members of the collection. Each must have a DDE resource type
        classification and basic descriptive properties.
      minItems: 1
      items:
        allOf:
        - $ref: ../../../DDEproperties/ddeResourceType/schema.yaml
        - type: object
          properties:
            '@type':
              type: array
              items:
                type: string
              default:
              - schema:CreativeWork
            'schema:name':
              type: string
            'schema:description':
              type: string
          required:
          - '@type'
          - 'schema:name'
  required:
  - 'schema:hasPart'
