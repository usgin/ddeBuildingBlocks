---
$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: DDE Image profile
description: DDE profile for image resources (image, photograph, explanatoryFigure,
  map). Extends DDEDiscovery with resource type constraint and ddeImagery
  properties. If additionalType termCode is map, ddeGeographicDataset
  constraints are also applied.
allOf:
- $ref: ../../../DDEproperties/ddeCore/schema.yaml
- $ref: ../../../DDEproperties/ddeOptional/schema.yaml
- $ref: ../../../DDEproperties/ddeImagery/schema.yaml
- properties:
    'schema:additionalType':
      contains:
        type: object
        properties:
          '@type':
            const: schema:DefinedTerm
          'schema:inDefinedTermSet':
            const: 'dde:codelist/ResourceTypeCode'
          'schema:termCode':
            type: string
            enum:
            - image
            - map
            - photograph
            - explanatoryFigure
        required:
        - '@type'
        - 'schema:inDefinedTermSet'
        - 'schema:termCode'
      minContains: 1
- if:
    properties:
      'schema:additionalType':
        contains:
          type: object
          properties:
            'schema:termCode':
              const: map
  then:
    $ref: ../../../DDEproperties/ddeGeographicDataset/schema.yaml
