---
$schema: https://json-schema.org/draft/2020-12/schema
title: DDE Mandatory metadata properties
description: Extends CDIF mandatory metadata with DDE-specific mandatory fields.
allOf:
- $ref: '#/$defs/CdifMandatory'
- $ref: ../ddeResourceType/schema.yaml
- type: object
  properties:
    'schema:subjectOf':
      $ref: '#/$defs/DdeCatalogRecord'
    'schema:keywords':
      type: array
      description: Extends base CDIF keyword schema to require DefinedTerms from
        both the DDE TopicCategoryCode and AcquisitionTypeCode codelists.
      minItems: 2
      items:
        anyOf:
        - $ref: '#/$defs/DefinedTerm'
        - type: string
      allOf:
      - contains:
          type: object
          properties:
            '@type':
              contains:
                const: schema:DefinedTerm
            'schema:inDefinedTermSet':
              const: 'dde:codelist/TopicCategoryCode'
          required:
          - '@type'
          - 'schema:inDefinedTermSet'
        minContains: 1
      - contains:
          type: object
          properties:
            '@type':
              contains:
                const: schema:DefinedTerm
            'schema:inDefinedTermSet':
              const: 'dde:codelist/AcquisitionTypeCode'
          required:
          - '@type'
          - 'schema:inDefinedTermSet'
        minContains: 1
    'schema:alternateName':
      description: Alternative names or aliases for the resource.
      anyOf:
      - type: string
      - type: array
        items:
          type: string
    'schema:image':
      type: array
      description: Browse graphics for the resource. At least one ImageObject is required
        for DDE metadata.
      minItems: 1
      items:
        type: object
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              const: schema:ImageObject
            minItems: 1
          'schema:contentUrl':
            type: string
            format: uri
            description: URL to the image file
          'schema:name':
            type: string
            description: Caption or title for the browse graphic
          'schema:encodingFormat':
            type: string
            description: MIME type of the image
        required:
        - '@type'
        - 'schema:contentUrl'
  required:
  - 'schema:additionalType'
  - 'schema:keywords'
  - 'schema:image'
$defs:
  CdifMandatory:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/_sources/cdifProperties/cdifCore/schema.yaml
  DefinedTerm:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/_sources/schemaorgProperties/definedTerm/schema.yaml
  DdeCatalogRecord:
    $ref: ../ddeCatalogRecord/schema.yaml
