            - type: object
              properties:
                '@id':
                  type: string
          schema:datePublished:
            type: string
            description: ISO8601 date when this claim was published
          schema:appearance:
            description: Where this claim appears
            anyOf:
            - type: string
            - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/LabeledLink
