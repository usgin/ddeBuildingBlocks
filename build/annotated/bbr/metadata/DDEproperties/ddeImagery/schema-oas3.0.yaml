          properties:
            '@id':
              type: string
              description: IRI reference to a Person or Organization defined elsewhere
          required:
          - '@id'
        - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.person
        - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
    required:
