x-defs:
  cdif.bbr.metadata.cdifProperties.cdifProvActivity:
    title: CDIF Provenance Activity
    description: Extended provenance activity building block for CDIF. Extends the
      minimal prov:Activity (generatedBy) with schema.org Action properties for comprehensive
      provenance documentation including agents, instruments, methodology, temporal
      bounds, action chaining, and more.
    type: object
    allOf:
    - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.provProperties.generatedBy
    - type: object
      properties:
        '@type':
          type: array
          items:
            type: string
          minItems: 2
          contains:
            enum:
            - schema:Action
          description: Must include both schema:Action and prov:Activity (prov:Activity
            required by base generatedBy schema)
        prov:used:
          type: array
          items:
            anyOf:
            - type: string
            - type: object
              properties:
                '@id':
                  type: string
                  description: a resolvable reference to a representation of the software
                    or instrument used
            - type: object
              description: an item used by the activity that includes a schema:instrument
                sub-key
              properties:
                schema:instrument:
                  $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Instrument
              required:
              - schema:instrument
        schema:name:
          type: string
          description: Human-readable name for the activity
        schema:description:
          type: string
          description: Text description of what this activity did
        schema:identifier:
          description: Formal identifier for this activity
          anyOf:
          - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Identifier
          - type: string
        schema:agent:
          description: Primary responsible agent for this activity (maps to PROV wasAssociatedWith)
          anyOf:
          - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Person
          - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Organization
          - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/AgentInRole
          - type: object
            properties:
              '@id':
                type: string
                description: reference to an agent defined elsewhere
            required:
            - '@id'
        schema:participant:
          description: Other participants in this activity
          type: array
          items:
            anyOf:
            - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Person
            - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/Organization
            - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/AgentInRole
            - type: object
              properties:
                '@id':
                  type: string
                  description: reference to a participant defined elsewhere
              required:
              - '@id'
        schema:object:
          description: Input entity for this activity (for action chaining, references
            the result of a prior activity)
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to an input entity
        schema:result:
          description: Output entity produced by this activity (for action chaining,
            can be referenced as object of a subsequent activity)
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to an output entity
        schema:actionStatus:
          type: string
          description: Status of this activity
          enum:
          - schema:CompletedActionStatus
          - schema:ActiveActionStatus
          - schema:PotentialActionStatus
          - schema:FailedActionStatus
        schema:startTime:
          type: string
          description: ISO8601 date-time when the activity started (maps to PROV startedAtTime)
        schema:endTime:
          type: string
          description: ISO8601 date-time when the activity ended (maps to PROV endedAtTime)
        schema:location:
          description: Where the activity occurred
          anyOf:
          - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/SpatialExtent
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a place defined elsewhere
        schema:actionProcess:
          description: Methodology or protocol for this activity
          anyOf:
          - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/HowTo
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a methodology defined elsewhere
        schema:error:
          type: string
          description: Error description for failed activities
        schema:additionalProperty:
          description: Domain-specific extension properties
          type: array
          items:
            $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/AdditionalProperty
    $defs:
      Person:
        $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.person
      Organization:
        $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
      AgentInRole:
        $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.agentInRole
      Identifier:
        $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      Instrument:
        $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument
      DefinedTerm:
        $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      LabeledLink:
        $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.labeledLink
      SpatialExtent:
        $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.spatialExtent
      AdditionalProperty:
        $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.additionalProperty
      HowTo:
        type: object
        description: A methodology or protocol described as a HowTo with optional
          steps
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - schema:HowTo
            minItems: 1
          '@id':
            type: string
          schema:name:
            type: string
            description: Name of the methodology or protocol
          schema:description:
            type: string
            description: Description of the methodology
          schema:url:
            type: string
            format: uri
            description: URL to a published methodology or protocol document
          schema:step:
            type: array
            description: Ordered steps in this methodology
            items:
              $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvActivity/$defs/HowToStep
        required:
        - '@type'
        anyOf:
        - required:
          - schema:name
        - required:
          - schema:url
      HowToStep:
        type: object
        description: A single step in a HowTo methodology
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - schema:HowToStep
            minItems: 1
          schema:name:
            type: string
            description: Name of this step
          schema:description:
            type: string
            description: Description of what this step involves
          schema:url:
            type: string
            format: uri
            description: URL to documentation for this step
          schema:position:
            type: integer
            description: Ordinal position of this step
        required:
        - '@type'
        - schema:name
      Claim:
        type: object
        description: A statement or assertion about the dataset, such as a quality
