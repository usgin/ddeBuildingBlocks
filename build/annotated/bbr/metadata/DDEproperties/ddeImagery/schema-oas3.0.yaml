          format consistently. Recommend 'Family Name, Given name' format.
      schema:description:
        type: string
      schema:identifier:
        description: identifier for person, recommend ORCID
        anyOf:
        - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
        - type: string
      schema:alternateName:
        type: string
        description: other labels by which the person might be known
      schema:affiliation:
        description: if affiliation is present, value must be a schema:Organization.
        allOf:
        - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeImagery/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
      schema:contactPoint:
        type: object
        description: restrict to email only. Schema.org allows telephone and postal
          contacts as well
        properties:
          '@type':
            default: schema:ContactPoint
            type: array
            items:
              type: string
            contains:
              enum:
              - schema:ContactPoint
            minItems: 1
          schema:email:
            type: string
        required:
        - schema:email
      schema:sameAs:
        type: array
        description: other identifiers for the person
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
