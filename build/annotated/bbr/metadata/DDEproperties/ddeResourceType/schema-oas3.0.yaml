title: DDE Resource Type constraint
description: Constrains schema:additionalType to require at least one DefinedTerm
  from the DDE ResourceTypeCode codelist (32 resource types from DDE spec Table 18).
type: object
properties:
  schema:additionalType:
    type: array
    description: Must include at least one DefinedTerm from the DDE ResourceTypeCode
      codelist.
    minItems: 1
    items:
      anyOf:
      - type: string
      - $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeResourceType/schema-oas3.0.yaml#/$defs/DefinedTerm
    contains:
      type: object
      properties:
        '@type':
          enum:
          - schema:DefinedTerm
        schema:inDefinedTermSet:
          enum:
          - dde:codelist/ResourceTypeCode
        schema:termCode:
          type: string
          enum:
          - aggregate
          - application
          - webApplication
          - collection
          - dataset
          - dataCatalog
          - geographicDataset
          - nonGeographicDataset
          - document
          - article
          - thesis
          - book
          - poster
          - webPage
          - image
          - map
          - photograph
          - explanatoryFigure
          - initiative
          - fieldSession
          - learningResource
          - guide
          - model
          - movie
          - repository
          - semanticResource
          - definedTermSet
          - series
          - service
          - webAPI
          - software
          - sound
      required:
      - '@type'
      - schema:inDefinedTermSet
      - schema:termCode
    minContains: 1
$defs:
  DefinedTerm:
    $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeResourceType/schema-oas3.0.yaml#/x-defs/metadataBuildingBlocks__sources_schemaorgProperties_definedTerm_schema
