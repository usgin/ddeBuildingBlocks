$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: DDE Event profile
description: DDE profile for event resources (initiative, fieldSession). Extends DDEDiscovery
  with resource type constraint and requires schema:temporalCoverage (mandatory temporal
  extent for events).
allOf:
- $ref: https://usgin.github.io/ddeBuildingBlocks/build/annotated/bbr/metadata/DDEproperties/ddeCore/schema.yaml
- properties:
    schema:additionalType:
      contains:
        type: object
        properties:
          '@type':
            contains:
              const: schema:DefinedTerm
          schema:inDefinedTermSet:
            const: dde:codelist/ResourceTypeCode
          schema:termCode:
            type: string
            enum:
            - initiative
            - fieldSession
        required:
        - '@type'
        - schema:inDefinedTermSet
        - schema:termCode
      minContains: 1
      x-jsonld-id: http://schema.org/additionalType
    schema:temporalCoverage:
      description: Temporal extent of resource content.
      type: array
      items:
        $ref: '#/$defs/TemporalExtent'
      x-jsonld-id: http://schema.org/temporalCoverage
  required:
  - schema:temporalCoverage
$defs:
  TemporalExtent:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/temporalExtent/schema.yaml
x-jsonld-prefixes:
  schema: http://schema.org/
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  dcterms: http://purl.org/dc/terms/
  geosparql: http://www.opengis.net/ont/geosparql#
  spdx: http://spdx.org/rdf/terms#
  time: http://www.w3.org/2006/time#
  dde: https://www.ddeworld.org/resource/
  dcat: http://www.w3.org/ns/dcat#
  prov: http://www.w3.org/ns/prov#
  dqv: http://www.w3.org/ns/dqv#
